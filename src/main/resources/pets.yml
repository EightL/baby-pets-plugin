# ═══════════════════════════════════════════════════════════
#  Baby Pets — Pet Definitions
# ═══════════════════════════════════════════════════════════
# Each pet gives the PLAYER an attribute bonus that scales with level (max 10).
# Rarity is communicated via item name color — no explicit label needed.
#
# special_ability: NONE | UNDERWATER_VISION | STORAGE
# storage_size:    5 (horse tier) | 9 (llama) | 14 (camel) | 18 (trader llama)
# storage_glass:   Bukkit Material name for the filler pane

content_version: 1

